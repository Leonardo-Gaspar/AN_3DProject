version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: postgres-AN_3DPrint

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - ./postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  backend:
    build: ./backend

    container_name: backend-AN_3DPrint

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    environment:
      DATABASE_URL: ${DATABASE_URL}

    restart: unless-stopped

  # frontend:
  #   build: ./frontend

  #   container_name: frontend-AN_3DPrint

  #   depends_on:
  #     - backend

  #   ports:
  #     - "5173:5173"

  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules

  #   restart: unless-stopped

  node-red:
    image: nodered/node-red:latest

    container_name: node-red-AN_3DPrint

    environment:
      TZ: America/Sao_Paulo

    ports:
      - "1880:1880"

    volumes:
      - ./node-red-data:/data

    restart: unless-stopped